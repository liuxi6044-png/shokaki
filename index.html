<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>消化器マスター</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#000000;
  --card:#000000;
  --border:#2f3336;
  --text:#e7e9ea;
  --sub:#71767b;
  --accent:#1d9bf0;
  --heart:#f91880;
  --rt:#00ba7c;
  --blank-bg:rgba(255,255,255,0.1);
  --blank-reveal:transparent;
  --blank-text:var(--accent);
}
html,body{
  background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  font-size:15px;line-height:1.5;overflow-x:hidden;
  -webkit-tap-highlight-color:transparent;
}
#top-bar{
  position:fixed;top:0;left:0;right:0;z-index:100;
  transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);
}
#top-bar.hidden{transform:translateY(-100%)}

#header{
  height:53px;
  background:rgba(0,0,0,0.85);backdrop-filter:blur(12px);
  padding:0 16px;
  display:flex;align-items:center;justify-content:space-between;
}
.header-left, .header-right { width:60px; display:flex; align-items:center; }
.header-right { justify-content:flex-end; }
.header-center { flex:1; display:flex; justify-content:center; }
.x-logo { width:24px; height:24px; fill:var(--text); }
.profile-icon { width:32px; height:32px; border-radius:50%; background-color:#1d9bf0; overflow:hidden; }
.profile-icon img { width:100%; height:100%; object-fit:cover; }
#progress{font-size:13px;color:var(--text);font-weight:700}

#tabs{
  background:rgba(0,0,0,0.65);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  display:flex;overflow-x:auto;scrollbar-width:none;
  -webkit-overflow-scrolling:touch;
}
#tabs::-webkit-scrollbar{display:none}
.tab{
  flex:0 0 auto;padding:16px 16px;font-size:15px;font-weight:500;
  color:var(--sub);cursor:pointer;white-space:nowrap;
  position:relative;transition:color 0.2s;
}
.tab:hover{background:rgba(255,255,255,0.03)}
.tab.active{color:var(--text);font-weight:700}
.tab.active::after{
  content:'';position:absolute;bottom:0;left:16px;right:16px;
  height:4px;background:var(--accent);border-radius:2px;
}

#controls{
  display:flex;gap:8px;padding:116px 16px 10px;
  border-bottom:1px solid var(--border);flex-wrap:wrap;
}
.ctrl-btn{
  padding:6px 16px;border-radius:9999px;font-size:14px;font-weight:700;
  border:1px solid var(--border);background:var(--bg);
  color:var(--text);cursor:pointer;transition:background 0.2s;
}
.ctrl-btn:hover{background:rgba(255,255,255,0.1)}
.ctrl-btn.on{
  background:var(--text);color:var(--bg);border-color:var(--text);
}

#timeline{padding-bottom:80px}

.card{
  display:flex;padding:12px 16px;
  border-bottom:1px solid var(--border);
  transition:opacity 0.3s;
}
.card.mastered{opacity:0.35}
.card-left{margin-right:12px;display:flex;flex-direction:column;align-items:center}
.card-right{flex:1;min-width:0}

.avatar{
  width:40px;height:40px;border-radius:50%;
  background:#16181c;display:flex;align-items:center;
  justify-content:center;font-size:24px;
}
.card-head{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:2px;
}
.meta{
  display:flex;align-items:center;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis;
}
.display-name{
  font-weight:700;font-size:15px;color:var(--text);margin-right:4px;
}
.display-name:hover{text-decoration:underline}
.handle,.time,.dot{color:var(--sub);font-size:15px}
.dot{margin:0 4px}

.card-body{
  font-size:15px;line-height:20px;
  word-wrap:break-word;white-space:pre-wrap;
  margin-top:2px;
}

.blank{
  display:inline-block;padding:0 6px;margin:0 2px;
  border-radius:4px;background:var(--blank-bg);
  color:var(--text);cursor:pointer;font-size:15px;
  border:none;line-height:inherit;transition:all 0.2s;
  font-family:inherit;
}
.blank:active{opacity:0.7}
.blank.revealed{
  background:var(--blank-reveal);color:var(--blank-text);
}

.actions{
  display:flex;justify-content:space-between;
  margin-top:12px;max-width:425px;
}
.action-group{display:flex;align-items:center}
.right-actions{gap:12px}
.action-btn{
  display:flex;align-items:center;background:none;border:none;
  color:var(--sub);cursor:pointer;font-size:13px;
  transition:color 0.2s;padding:0;
}
.action-btn .icon{
  display:flex;align-items:center;justify-content:center;
  width:34.75px;height:34.75px;border-radius:50%;
  transition:background-color 0.2s;
}
.action-btn svg{width:18.75px;height:18.75px;fill:currentColor}
.action-btn .count{padding:0 12px 0 0}

.reply-btn:hover{color:var(--accent)}
.reply-btn:hover .icon{background-color:rgba(29,155,240,0.1)}
.rt-btn:hover{color:var(--rt)}
.rt-btn:hover .icon{background-color:rgba(0,186,124,0.1)}
.like-btn:hover{color:var(--heart)}
.like-btn:hover .icon{background-color:rgba(249,24,128,0.1)}
.like-btn.hearted{color:var(--heart)}
.like-btn.hearted svg{fill:var(--heart)}
.view-btn:hover,.bm-btn:hover,.share-btn:hover{color:var(--accent)}
.view-btn:hover .icon,.bm-btn:hover .icon,.share-btn:hover .icon{background-color:rgba(29,155,240,0.1)}

.empty-msg{
  text-align:center;color:var(--sub);padding:60px 20px;font-size:15px;
}

#bottom-nav{
  position:fixed;bottom:0;left:0;right:0;height:53px;
  background:rgba(0,0,0,0.85);backdrop-filter:blur(12px);
  border-top:1px solid var(--border);
  display:flex;justify-content:space-around;align-items:center;
  z-index:100;transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);
}
#bottom-nav.hidden{transform:translateY(100%)}
.nav-item{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  flex:1;height:100%;color:var(--text);position:relative;cursor:pointer;
}
.icon-wrapper { position:relative; display:flex; }
.nav-item svg{width:26.25px;height:26.25px;fill:currentColor}
.active-dot{
  position:absolute;top:-2px;right:-2px;width:6px;height:6px;
  background-color:var(--accent);border-radius:50%;
}

#fab{
  position:fixed;bottom:69px;right:16px;width:56px;height:56px;
  border-radius:50%;background-color:var(--accent);
  display:flex;justify-content:center;align-items:center;
  box-shadow:0 8px 24px rgba(0,0,0,0.2);
  z-index:99;cursor:pointer;transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);
}
#fab svg{width:24px;height:24px;fill:#fff}
#fab.hidden{transform:translateY(150px)}
</style>
</head>
<body>
<div id="app">
  <div id="top-bar">
    <header id="header">
      <div class="header-left">
        <div class="profile-icon">
          <img src="https://abs.twimg.com/sticky/default_profile_images/default_profile_normal.png" alt="profile">
        </div>
      </div>
      <div class="header-center">
        <svg viewBox="0 0 24 24" class="x-logo"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 22.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.005 4.094H5.03z" fill="currentColor"></path></svg>
      </div>
      <div class="header-right">
        <span id="progress"></span>
      </div>
    </header>
    <nav id="tabs"></nav>
  </div>
  <div id="controls">
    <button class="ctrl-btn" id="btn-shuffle" onclick="shuffleCards()">シャッフル</button>
    <button class="ctrl-btn" id="btn-unshuffle" onclick="resetShuffle()">元の順序</button>
    <button class="ctrl-btn" id="btn-reveal-all" onclick="revealAll()">全て表示</button>
    <button class="ctrl-btn" id="btn-reset-all" onclick="resetAll()">全リセット</button>
  </div>
  <main id="timeline"></main>
</div>

<div id="bottom-nav">
  <div class="nav-item active">
    <div class="icon-wrapper">
      <svg viewBox="0 0 24 24"><path d="M21.591 7.146L12.52 1.157c-.316-.21-.724-.21-1.04 0l-9.071 5.989c-.26.173-.409.471-.409.783v12.571c0 1.105.895 2 2 2h16c1.105 0 2-.895 2-2V7.929c0-.312-.149-.61-.409-.783zM14 20h-4v-5c0-1.105.895-2 2-2s2 .895 2 2v5z" fill="currentColor"></path></svg>
      <div class="active-dot"></div>
    </div>
  </div>
  <div class="nav-item">
    <svg viewBox="0 0 24 24"><path d="M10.25 3.75c-3.59 0-6.5 2.91-6.5 6.5s2.91 6.5 6.5 6.5c1.795 0 3.419-.726 4.596-1.904 1.178-1.177 1.904-2.801 1.904-4.596 0-3.59-2.91-6.5-6.5-6.5zm-8.5 6.5c0-4.694 3.806-8.5 8.5-8.5s8.5 3.806 8.5 8.5c0 1.986-.682 3.815-1.824 5.262l4.781 4.781-1.414 1.414-4.781-4.781c-1.447 1.142-3.276 1.824-5.262 1.824-4.694 0-8.5-3.806-8.5-8.5z"></path></svg>
  </div>
  <div class="nav-item">
    <svg viewBox="0 0 24 24"><path d="M14.613 5.485L9.387 18.515l-1.874-.63 5.226-13.03 1.874.63zM21 12c0 4.97-4.03 9-9 9s-9-4.03-9-9 4.03-9 9-9 9 4.03 9 9zm-2 0c0-3.86-3.14-7-7-7s-7 3.14-7 7 3.14 7 7 7 7-3.14 7-7z"></path></svg>
  </div>
  <div class="nav-item">
    <svg viewBox="0 0 24 24"><path d="M19.993 9.042C19.946 4.092 16.035.1 11.996.1S4.046 4.091 4.004 9.042c-.019 2.213-.889 4.316-2.428 5.922l-.285.297v2.211h6.634c.488 1.436 1.849 2.428 3.42 2.428h.023c1.583 0 2.944-1.006 3.424-2.463h6.611v-2.193l-.288-.302c-1.531-1.604-2.399-3.702-2.417-5.908h2.305zm-3.468 8.43h-8.99v-.111c1.265-1.488 2.05-3.411 2.067-5.38.037-3.96 3.12-7.228 6.945-7.228h.01c3.812 0 6.892 3.256 6.94 7.213.018 1.956.794 3.864 2.046 5.342v.164h-9.018z"></path></svg>
  </div>
  <div class="nav-item">
    <svg viewBox="0 0 24 24"><path d="M1.998 12c0-5.523 4.477-10 10-10s10 4.477 10 10-4.477 10-10 10c-1.393 0-2.716-.285-3.92-.802L2 22l1.637-4.455C2.564 15.932 1.998 14.035 1.998 12zm2.083 4.227L3.02 19.16l2.842-.907.575.247A7.95 7.95 0 0012 20c4.418 0 8-3.582 8-8s-3.582-8-8-8-8 3.582-8 8c0 1.583.46 3.056 1.25 4.312l.247.575z"></path></svg>
  </div>
</div>

<div id="fab">
  <svg viewBox="0 0 24 24"><path d="M11 11V4h2v7h7v2h-7v7h-2v-7H4v-2h7z"></path></svg>
</div>

<script>
const QUIZ_DATA = [{"title": "食道疾患（良性・悪性・治療）", "short": "食道", "icon": "🔴", "questions": [{"id": "1-1", "text": "GERD（胃食道逆流症）の治療には、プロトンポンプ阻害薬（PPI）や 【 ① 】（カリウムイオン競合型アシッドブロッカー）の使用が推奨される。また、【 ② 】（H2RA）も効果がある。", "blanks": {"①": "P-CAB", "②": "H2受容体拮抗薬"}}, {"id": "1-2", "text": "逆流性食道炎に比べて、非びらん性胃食道逆流症（NERD）はPPIの奏功率が 【 ③ 】。", "blanks": {"③": "低い"}}, {"id": "1-3", "text": "GERDは内科的治療が基本だが、難治性の場合や重症裂孔ヘルニアを伴う場合は 【 ④ 】 的治療の適応となることがある。", "blanks": {"④": "外科"}}, {"id": "1-4", "text": "食道アカラシアは、Auerbach神経叢の消失・変性により、下部食道括約筋（LES）の 【 ⑤ 】 が生じる疾患であり、20〜40代の若い男女にもみられる。", "blanks": {"⑤": "弛緩不全"}}, {"id": "1-5", "text": "食道アカラシアの確定診断には 【 ⑥ 】 測定が必須である。治療として近年、経口内視鏡的筋層切開術（ 【 ⑦ 】 ）が効果を上げている。外科治療では 【 ⑧ 】 手術などが行われる。", "blanks": {"⑥": "食道内圧", "⑦": "POEM", "⑧": "Heller-Dor"}}, {"id": "1-6", "text": "特発性食道破裂は、激しい 【 ⑨ 】 を契機として下部食道左側に生じることが多い。保存的治療では軽快しないため 【 ⑩ 】 治療（緊急手術など）が必要となる。", "blanks": {"⑨": "嘔吐", "⑩": "外科"}}, {"id": "1-7", "text": "Mallory-Weiss症候群は嘔吐に伴う食道胃接合部粘膜の裂創であり、特発性食道破裂とは異なり 【 ⑪ 】 的治療で軽快することが多い。", "blanks": {"⑪": "保存"}}, {"id": "1-8", "text": "好酸球性食道炎や食道憩室は、胸痛よりも 【 ⑫ 】 感や食物の逆流を症状として訴えることが多い。", "blanks": {"⑫": "つかえ"}}, {"id": "1-9", "text": "食道静脈瘤の確定診断・観察のために、内視鏡下での生検を行うことは出血のリスクがあるため 【 ⑬ 】 である。", "blanks": {"⑬": "禁忌"}}, {"id": "1-10", "text": "食道静脈瘤の供血路は 【 ⑭ 】 が最も多い。", "blanks": {"⑭": "左胃静脈"}}, {"id": "1-11", "text": "食道静脈瘤と胃静脈瘤が連続している場合、内視鏡的静脈瘤結紮療法（EVL）は 【 ⑮ 】 である。", "blanks": {"⑮": "禁忌"}}, {"id": "1-12", "text": "内視鏡的静脈瘤硬化療法（EIS）は、X線透視下で硬化剤を門脈ではなく 【 ⑯ 】 まで十分に注入する。", "blanks": {"⑯": "供血路"}}, {"id": "1-13", "text": "Barrett食道は、食道下部の扁平上皮が円柱上皮に置換されたものであり、扁平上皮癌ではなく 【 ⑰ 】 癌の発生母地となる。", "blanks": {"⑰": "腺"}}, {"id": "1-14", "text": "Barrett食道は、内視鏡において 【 ⑱ 】 の下端より口側に存在し、病変が 【 ⑲ 】 ほど癌化のリスクが高い。", "blanks": {"⑱": "柵状血管", "⑲": "長い"}}, {"id": "1-15", "text": "わが国の食道癌の組織型は 【 ⑳ 】 癌が最も多く、女性より 【 ㉑ 】 に多い。好発部位は胸部 【 ㉒ 】 食道である。", "blanks": {"⑳": "扁平上皮", "㉑": "男性", "㉒": "中部"}}, {"id": "1-16", "text": "早期食道癌は、腫瘍の浸潤が 【 ㉓ 】 層までにとどまり、リンパ節転移の有無を問わない）。", "blanks": {"㉓": "粘膜下"}}, {"id": "1-17", "text": "食道癌の検索において、通常白色光よりも 【 ㉕ 】 光（NBI）が有用である。", "blanks": {"㉕": "狭帯域"}}, {"id": "1-18", "text": "食道扁平上皮癌は、ヨード染色により濃染せず 【 ㉖ 】 帯として観察される。内視鏡治療の際にはヨード染色を行い病変範囲を正確に診断する。", "blanks": {"㉖": "不染"}}, {"id": "1-19", "text": "食道癌の浸潤が 【 ㉗ 】 層にとどまると診断された病変は、内視鏡治療の良い適応である。", "blanks": {"㉗": "粘膜固有"}}, {"id": "1-20", "text": "広範囲な病変の内視鏡治療では、EMR（内視鏡的粘膜切除術）よりも、一括切除が可能な 【 ㉘ 】（内視鏡的粘膜下層剥離術）が良い適応となる。", "blanks": {"㉘": "ESD"}}, {"id": "1-21", "text": "内視鏡治療中に穿孔をきたした場合は、ただちに外科手術を行うのではなく、クリップ等を用いて 【 ㉙ 】 的に閉鎖できることが多い。", "blanks": {"㉙": "内視鏡"}}, {"id": "1-22", "text": "食道癌で上縦隔リンパ節転移が疑われるなどの進行癌では、術前 【 ㉚ 】 療法を行ってから手術（リンパ節郭清）を行うのが標準的である。", "blanks": {"㉚": "化学"}}, {"id": "1-23", "text": "根治的化学放射線療法後の局所再発などに対しては、サルベージ手術のほかに、光線力学療法（ 【 ㉛ 】 ）が良い適応となることがある。", "blanks": {"㉛": "PDT"}}, {"id": "1-24", "text": "食道切除後の再建に用いられる胃管の栄養血管は、左胃大網動脈ではなく 【 ㉜ 】 動脈である。", "blanks": {"㉜": "右胃大網"}}, {"id": "1-25", "text": "胃管による再建経路のうち、最も長い距離を必要とするのは後縦隔経路ではなく 【 ㉝ 】 経路である。", "blanks": {"㉝": "前胸部皮下"}}, {"id": "1-26", "text": "頸部食道切除後の再建には、有茎空腸ではなく主に遊離 【 ㉞ 】 が用いられる。", "blanks": {"㉞": "空腸"}}]}, {"title": "胃・十二指腸疾患（良性・悪性・外科治療）", "short": "胃・十二指腸", "icon": "🟡", "questions": [{"id": "2-1", "text": "H. pylori はウレアーゼを産生するため、これを利用した 【 ① 】 試験が診断に用いられる。", "blanks": {"①": "尿素呼気"}}, {"id": "2-2", "text": "H. pylori は主に 【 ② 】 期に感染が成立して慢性炎症を引き起こし、胃炎や胃・十二指腸潰瘍の原因となる。また、胃癌の発癌機序としては 【 ③ 】 の仮説が考えられている。", "blanks": {"②": "小児", "③": "Correa"}}, {"id": "2-3", "text": "H. pylori の初回除菌（一次除菌）に用いられる薬剤は、PPI（またはP-CAB）、アモキシシリン、および 【 ④ 】 である。", "blanks": {"④": "クラリスロマイシン"}}, {"id": "2-4", "text": "初回除菌失敗の原因として、喫煙、薬剤耐性（耐性菌）、PPIの効果の個体差、服薬コンプライアンス（アドヒアランス）の不良などが挙げられるが、【 ⑤ 】 抗体の出現は原因とならない。", "blanks": {"⑤": "中和"}}, {"id": "2-5", "text": "一次除菌に失敗した際の二次除菌には、【 ⑥ 】 が用いられる。", "blanks": {"⑥": "メトロニダゾール"}}, {"id": "2-6", "text": "胃潰瘍の好発部位は胃角部小弯であるが、高齢者では胃体上部小弯でも生じやすい。十二指腸潰瘍の好発部位は十二指腸 【 ⑦ 】 部（前壁）である。", "blanks": {"⑦": "球"}}, {"id": "2-7", "text": "十二指腸潰瘍の穿孔が疑われる場合、バリウムを用いた消化管造影検査は 【 ⑧ 】 である。また、フリーエアの確認には立位の腹部X線（レントゲン）やCTが有用である。", "blanks": {"⑧": "禁忌"}}, {"id": "2-8", "text": "薬剤性胃潰瘍の原因として最も多いのは、PPIではなく 【 ⑨ 】 （非ステロイド性抗炎症薬）である。", "blanks": {"⑨": "NSAIDs"}}, {"id": "2-9", "text": "胃の過形成性ポリープは出血を伴うことがあり、消化管出血や 【 ⑩ 】 の原因となる。", "blanks": {"⑩": "貧血"}}, {"id": "2-10", "text": "胃底腺ポリープは、H. pylori 感染とは 【 ⑪ 】 である（ピロリ陰性胃粘膜に好発する）。", "blanks": {"⑪": "無関係（陰性）"}}, {"id": "2-11", "text": "胃腺腫は内視鏡生検のGroup分類においてGroup 【 ⑫ 】 に分類され（Group 5は癌）、早期胃癌との鑑別が難しいことがある。", "blanks": {"⑫": "3"}}, {"id": "2-12", "text": "胃ポリープの肉眼形態（山田分類）において、有茎性ポリープはⅠ型ではなく 【 ⑬ 】 型である。", "blanks": {"⑬": "IV"}}, {"id": "2-13", "text": "胃アニサキス症は、初感染の場合はアレルギー反応が起きないため、必ずしも 【 ⑭ 】 を伴って発症するわけではない。", "blanks": {"⑭": "腹痛"}}, {"id": "2-14", "text": "胃粘膜下腫瘍の内視鏡所見では、腫瘍が周囲の正常粘膜を引っ張ることで生じる 【 ⑮ 】 fold が特徴的である。", "blanks": {"⑮": "bridging"}}, {"id": "2-15", "text": "胃の非上皮性腫瘍のうち、GIST（消化管間質腫瘍）は切除可能であれば 【 ⑯ 】 が第一選択となる。", "blanks": {"⑯": "外科的切除"}}, {"id": "2-16", "text": "胃MALTリンパ腫の治療は、放射線治療ではなくH. pylori の 【 ⑰ 】 療法が第一選択となる。", "blanks": {"⑰": "除菌"}}, {"id": "2-17", "text": "胃癌の組織型は 【 ⑱ 】 癌が多く、女性よりも男性に多い。", "blanks": {"⑱": "腺"}}, {"id": "2-18", "text": "早期胃癌は、腫瘍の浸潤が 【 ⑲ 】 層までにとどまるものを指し、リンパ節転移の 【 ⑳ 】 は問わない。", "blanks": {"⑲": "粘膜下", "⑳": "有無"}}, {"id": "2-19", "text": "胃癌の内視鏡による範囲診断では、食道癌で用いるヨード染色ではなく、【 ㉑ 】 散布が行われる。", "blanks": {"㉑": "インジゴカルミン"}}, {"id": "2-20", "text": "早期胃癌に対する内視鏡治療は、未分化型よりも 【 ㉒ 】 型のほうが適応となりやすく、治療件数も多い。", "blanks": {"㉒": "分化"}}, {"id": "2-21", "text": "早期胃癌の90%以上はEMRではなくESD（内視鏡的粘膜下層剥離術）で治療される。ESDで非治癒切除（eCura C2）と判定された場合は、追加で 【 ㉓ 】 治療（リンパ節郭清を伴う追加腸管切除）を行う。", "blanks": {"㉓": "外科"}}, {"id": "2-22", "text": "胃癌の外科治療において、胃全摘術後の再建法として最も標準的なのは 【 ㉔ 】 法である（Billroth-I法は幽門側胃切除後の再建法である）。", "blanks": {"㉔": "Roux-en-Y （ルーエンワイ）"}}, {"id": "2-23", "text": "胃切除後の早期ダンピング症候群は食直後に生じるが、食後2〜3時間後に生じる後期ダンピング症候群では、インスリンの過剰分泌により 【 ㉕ 】 状態となる。", "blanks": {"㉕": "低血糖"}}, {"id": "2-24", "text": "ダンピング症候群の予防には、ゆっくりよく噛んで食べることや、食事の回数を分ける 【 ㉖ 】 食が指導される。", "blanks": {"㉖": "分割"}}, {"id": "2-25", "text": "胃全摘後には、内因子の欠乏によりビタミンB12の吸収障害が起こり、【 ㉗ 】 性貧血が生じる。", "blanks": {"㉗": "大球"}}, {"id": "2-26", "text": "胃切除後（特に胃全摘後など）には、胆汁や膵液の逆流による 【 ㉘ 】 性（アルカリ性）の逆流性食道炎が起こることがある。", "blanks": {"㉘": "胆汁・膵液"}}, {"id": "2-27", "text": "胃切除後は、迷走神経切離などの影響により胆嚢の収縮能が低下し、【 ㉙ 】 が生じやすくなる。", "blanks": {"㉙": "胆石"}}]}, {"title": "上部消化管救急・治療", "short": "上部救急", "icon": "🚨", "questions": [{"id": "3-1", "text": "吐血や下血に伴う出血性ショックの症状には、蒼白、冷汗、意識障害、四肢冷感のほか、徐脈ではなく 【 ① 】 がみられる。", "blanks": {"①": "頻脈"}}, {"id": "3-2", "text": "大量の吐血で来院したショック状態の患者に対しては、内視鏡検査や腹水穿刺を急ぐのではなく、ただちに 【 ② 】 を確保し、補液を開始することが最優先である。", "blanks": {"②": "血管（または 静脈ルート）"}}, {"id": "3-3", "text": "上部消化管出血（胃・十二指腸潰瘍、胃粘膜腫瘍、Mallory-Weiss症候群など）では、血液が胃酸と反応して黒色となるため 【 ③ 】 便を呈する。萎縮性胃炎単独では通常、出血源とはなりにくい。", "blanks": {"③": "タール"}}, {"id": "3-4", "text": "Mallory-Weiss症候群は激しい嘔吐に伴う食道胃接合部粘膜の裂創であり、多くは 【 ④ 】 的治療で軽快する。", "blanks": {"④": "保存"}}, {"id": "3-5", "text": "特発性食道破裂は嘔吐などを契機に下部食道左側に穿孔をきたす疾患であり、保存的治療では軽快しないため 【 ⑤ 】 治療（緊急手術など）が必要となる。", "blanks": {"⑤": "外科"}}, {"id": "3-6", "text": "噴出性の出血を伴う消化性潰瘍に対しては、止血剤の内服ではなく 【 ⑥ 】 的止血術が第一選択である。", "blanks": {"⑥": "内視鏡"}}, {"id": "3-7", "text": "十二指腸潰瘍の穿孔の好発部位は十二指腸球部 【 ⑦ 】 壁である。穿孔が疑われる場合、消化管造影での 【 ⑧ 】 使用は禁忌であり、フリーエアの同定には腹部X線（立位）や腹部 【 ⑨ 】 検査が優れている。", "blanks": {"⑦": "前", "⑧": "バリウム", "⑨": "CT"}}, {"id": "3-8", "text": "食道静脈瘤の主な供血路は 【 ⑩ 】 静脈である。", "blanks": {"⑩": "左胃"}}, {"id": "3-9", "text": "食道静脈瘤の確定診断のために、内視鏡下で 【 ⑪ 】 を行うことは破裂のリスクがあるため禁忌である。", "blanks": {"⑪": "生検"}}, {"id": "3-10", "text": "食道静脈瘤に対する内視鏡的静脈瘤硬化療法（EIS）は、X線透視下で硬化剤を門脈まで流し込むのではなく、【 ⑫ 】 まで十分に注入する。", "blanks": {"⑫": "供血路"}}, {"id": "3-11", "text": "食道静脈瘤と胃静脈瘤が連続している場合、内視鏡的静脈瘤結紮療法（EVL）は 【 ⑬ 】 である。", "blanks": {"⑬": "禁忌"}}, {"id": "3-12", "text": "早期食道癌の内視鏡治療では、腫瘍の浸潤が 【 ⑭ 】 層までにとどまると診断された病変が良い適応となる。", "blanks": {"⑭": "粘膜固有"}}, {"id": "3-13", "text": "内視鏡的粘膜下層剥離術（ESD）を行う際、食道癌では病変範囲診断のために 【 ⑮ 】 染色を行い、胃癌では 【 ⑯ 】 散布を行う。", "blanks": {"⑮": "ヨード", "⑯": "インジゴカルミン"}}, {"id": "3-14", "text": "早期胃癌に対する内視鏡治療は、未分化型よりも 【 ⑰ 】 型のほうが適応となりやすく、治療件数も多い。", "blanks": {"⑰": "分化"}}, {"id": "3-15", "text": "早期胃癌の内視鏡治療の90%以上は、EMR（内視鏡的粘膜切除術）ではなく、より広範囲な一括切除が可能な 【 ⑱ 】 で行われている。", "blanks": {"⑱": "ESD"}}, {"id": "3-16", "text": "内視鏡治療中に穿孔をきたした場合は、ただちに外科手術を行うのではなく、クリップ等を用いて 【 ⑲ 】 的に閉鎖できることが多い。", "blanks": {"⑲": "内視鏡"}}, {"id": "3-17", "text": "早期胃癌のESD後に病理診断で非治癒切除（eCura C2）と判定された場合は、リンパ節転移のリスクがあるため、追加で 【 ⑳ 】 治療（追加腸管切除・リンパ節郭清）を行う。", "blanks": {"⑳": "外科"}}]}, {"title": "代謝外科（肥満・糖尿病に対する外科治療）", "short": "代謝外科", "icon": "⚖️", "questions": [{"id": "4-1", "text": "日本の保険診療における腹腔鏡下スリーブ状胃切除術の適応基準は、原則としてBMI 【 ① 】 以上の高度肥満症である。", "blanks": {"①": "35"}}, {"id": "4-2", "text": "減量手術が保険適応となる条件として、BMIの基準に加えて、肥満に起因・関連する健康障害（ 【 ② 】 、高血圧、脂質異常症、睡眠時無呼吸症候群など）を有することが求められる。", "blanks": {"②": "糖尿病"}}, {"id": "4-3", "text": "一方、非アルコール性肝疾患や 【 ③ 】 は、それ単独では減量手術の保険適応となる必須の合併症基準には含まれない（過去問で適応外の選択肢として頻出）。", "blanks": {"③": "痛風"}}, {"id": "4-4", "text": "減量・代謝改善手術の術式のうち、2型糖尿病の改善効果がより高いのは、胃を細く切り取る腹腔鏡下スリーブ状胃切除術単独ではなく、それに 【 ④ 】 吻合（バイパス）を付加した術式である。", "blanks": {"④": "空腸十二指腸"}}, {"id": "4-5", "text": "【 ⑤ 】 は皮下脂肪を物理的に除去する美容目的の処置であり、糖尿病の改善や医学的な長期減量効果をもたらす代謝外科手術には含まれない。", "blanks": {"⑤": "脂肪吸引"}}]}, {"title": "腸炎・炎症性腸疾患 (IBD) および外科治療", "short": "IBD", "icon": "🟢", "questions": [{"id": "5-1", "text": "日本における潰瘍性大腸炎とクローン病の患者数はともに 【 ① 】 傾向にあり、クローン病よりも潰瘍性大腸炎のほうが患者数が 【 ② 】 。", "blanks": {"①": "増加", "②": "多い"}}, {"id": "5-2", "text": "潰瘍性大腸炎は若年者に限らず、高齢者での新規発症も 【 ③ 】 。また、潰瘍性大腸炎・クローン病ともに発症頻度に明らかな性差は 【 ④ 】 。", "blanks": {"③": "珍しくない （過去問の「高齢者は稀」は誤り）", "④": "ない"}}, {"id": "5-3", "text": "潰瘍性大腸炎は直腸から口側の大腸へと広がる 【 ⑤ 】 性の病変であり、長期経過例（10年以上）では 【 ⑥ 】 癌のリスクが高まる。", "blanks": {"⑤": "連続", "⑥": "大腸"}}, {"id": "5-4", "text": "潰瘍性大腸炎の腸管外合併症として、原発性硬化性 【 ⑦ 】 炎（PSC）が見られることがある。", "blanks": {"⑦": "胆管 （PSC）"}}, {"id": "5-5", "text": "クローン病は口から肛門までの全消化管に生じうるが、正常粘膜を挟んで病変が点在する 【 ⑧ 】 lesion（跳躍病変）が見られる。", "blanks": {"⑧": "skip"}}, {"id": "5-6", "text": "クローン病の病変は粘膜にとどまらず 【 ⑨ 】 性の炎症を起こすため、進行すると狭窄や瘻孔を形成する。", "blanks": {"⑨": "全層"}}, {"id": "5-7", "text": "クローン病の特徴的な内視鏡・病理所見として、縦走潰瘍、敷石像、および非乾酪性 【 ⑩ 】 が挙げられる。", "blanks": {"⑩": "肉芽腫"}}, {"id": "5-8", "text": "潰瘍性大腸炎およびクローン病の治療には、5-アミノサリチル酸（5-ASA）製剤が寛解 【 ⑪ 】 および寛解維持に用いられる。", "blanks": {"⑪": "導入"}}, {"id": "5-9", "text": "副腎皮質ステロイドは、クローン病や潰瘍性大腸炎の寛解導入には有効であるが、寛解 【 ⑫ 】 療法には適さない。", "blanks": {"⑫": "維持"}}, {"id": "5-10", "text": "アザチオプリン（チオプリン製剤）を投与する際、副作用である重篤な白血球減少を予測するために 【 ⑬ 】 遺伝子多型の検査が有用である。", "blanks": {"⑬": "NUDT15"}}, {"id": "5-11", "text": "クローン病の治療においては、食事からの抗原刺激を避けるための 【 ⑭ 】 療法（成分栄養剤など）が有効である。", "blanks": {"⑭": "栄養"}}, {"id": "5-12", "text": "難治性のIBDに対しては、インフリキシマブなどの抗 【 ⑮ 】 α製剤（分子標的薬）が寛解導入・維持に有効である。", "blanks": {"⑮": "TNF"}}, {"id": "5-13", "text": "潰瘍性大腸炎の手術において、大腸 【 ⑯ 】 や大量出血は絶対的手術適応である。薬物療法の副作用が強く内科的治療が困難な場合は 【 ⑰ 】 的手術適応となる。", "blanks": {"⑯": "穿孔", "⑰": "相対"}}, {"id": "5-14", "text": "潰瘍性大腸炎の標準的な自然肛門温存術は、大腸全摘および 【 ⑱ 】 嚢肛門（管）吻合術である。", "blanks": {"⑱": "回腸"}}, {"id": "5-15", "text": "潰瘍性大腸炎の術後合併症として回腸嚢炎が多く、これには 【 ⑲ 】 薬の投与が有効である。", "blanks": {"⑲": "抗菌"}}, {"id": "5-16", "text": "クローン病で手術適応となる理由として最も多いのは腸管の 【 ⑳ 】 や閉塞である。大量出血は絶対的手術適応である。", "blanks": {"⑳": "狭窄"}}, {"id": "5-17", "text": "クローン病の手術において、小腸の限局した線維性狭窄には 【 ㉑ 】 形成術を行い、長い（高度な）狭窄にはバイパス術を行う。", "blanks": {"㉑": "狭窄"}}, {"id": "5-18", "text": "クローン病では再燃による度重なる腸管切除の結果、吸収不良に陥る 【 ㉒ 】 症候群を呈することがあるため、腸管の温存が重要である。", "blanks": {"㉒": "短腸"}}, {"id": "5-19", "text": "抗菌薬起因性出血性腸炎は、ペニシリン系やセフェム系抗菌薬の使用後、数 【 ㉓ 】 で発症することが多い。", "blanks": {"㉓": "日 （「数週間後」は誤り）"}}, {"id": "5-20", "text": "偽膜性腸炎は、抗菌薬投与による菌交代現象によりクロストリジウム・ 【 ㉔ 】 が異常増殖して発症する。", "blanks": {"㉔": "ディフィシル"}}, {"id": "5-21", "text": "NSAIDs（非ステロイド性抗炎症薬）は、胃潰瘍だけでなく、小腸や回腸に多様な潰瘍（ 【 ㉕ 】 潰瘍など）を形成することがある。", "blanks": {"㉕": "縦走"}}, {"id": "5-22", "text": "細菌性腸炎の中で最も頻度が高いのは 【 ㉖ 】 であり、鶏肉などの摂取で感染する。", "blanks": {"㉖": "カンピロバクター"}}, {"id": "5-23", "text": "エルシニア腸炎の診断には、便の 【 ㉗ 】 培養が有用である。", "blanks": {"㉗": "低温"}}, {"id": "5-24", "text": "腸管出血性大腸菌は 【 ㉘ 】 毒素を産生し、溶血性尿毒症症候群（HUS）を合併することがある。", "blanks": {"㉘": "ベロ"}}, {"id": "5-25", "text": "腸結核の内視鏡所見では、回盲部にクローン病とは異なる 【 ㉙ 】 状潰瘍が見られる。", "blanks": {"㉙": "輪"}}, {"id": "5-26", "text": "アメーバ赤痢は旅行者下痢症や性感染症として知られ、内視鏡所見などで 【 ㉚ 】 炎との鑑別が必要である。", "blanks": {"㉚": "潰瘍性大腸"}}, {"id": "5-27", "text": "サイトメガロウイルス（CMV）腸炎は免疫低下時に生じる 【 ㉛ 】 感染であり、潰瘍性大腸炎の増悪（ステロイド抵抗性）の原因となることがある。内視鏡では 【 ㉜ 】 抜き潰瘍が見られる。", "blanks": {"㉛": "日和見", "㉜": "打ち"}}, {"id": "5-28", "text": "免疫チェックポイント阻害剤の副作用（irAE）として腸炎が生じることがあり、治療には5-ASA製剤ではなく 【 ㉝ 】 が第一選択となる。", "blanks": {"㉝": "ステロイド"}}]}, {"title": "下部消化管腫瘍・内視鏡・外科治療", "short": "大腸癌", "icon": "🔵", "questions": [{"id": "6-1", "text": "日本における悪性新生物の部位別死亡率について、女性では大腸癌が第 【 ① 】 位である。", "blanks": {"①": "1 （第1位）"}}, {"id": "6-2", "text": "大腸癌の危険因子として、肥満、飲酒、および 【 ② 】 肉（赤肉・加工肉）の摂取が挙げられる。", "blanks": {"②": "貯蔵"}}, {"id": "6-3", "text": "大腸癌の組織型は 【 ③ 】 癌が最も多い。", "blanks": {"③": "腺"}}, {"id": "6-4", "text": "大腸癌の好発部位は直腸や 【 ④ 】 結腸などの左側結腸である。", "blanks": {"④": "S状"}}, {"id": "6-5", "text": "早期大腸癌の場合、血便や便秘などの便通異常を認めることは 【 ⑤ 】 ことが多い。一方、進行癌になると便通異常が発見の契機となることが多い。", "blanks": {"⑤": "ない （無症状であることが多い）"}}, {"id": "6-6", "text": "大腸癌検診では、食事の影響を受けない便潜血検査の 【 ⑥ 】 法が推奨されている。", "blanks": {"⑥": "免疫"}}, {"id": "6-7", "text": "便潜血検査において、2日のうち 【 ⑦ 】 日でも陽性であれば精密検査（全大腸内視鏡検査など）が必要となる。また、便潜血が陰性であっても大腸癌が存在することは 【 ⑧ 】。", "blanks": {"⑦": "1", "⑧": "ある"}}, {"id": "6-8", "text": "注腸造影検査は腸管全体の俯瞰に有用であるが、小病変や平坦病変の指摘が困難であり、生検やポリープ切除などの治療を行うことは 【 ⑨ 】 である。", "blanks": {"⑨": "不可能 （できない）"}}, {"id": "6-9", "text": "大腸内視鏡検査は生検や治療が可能であるが、腸管の 【 ⑩ 】 や腹膜炎を伴う場合は禁忌である。", "blanks": {"⑩": "穿孔"}}, {"id": "6-10", "text": "小腸の検査において、【 ⑪ 】 内視鏡は病変の詳細な観察が可能で低侵襲だが、小腸内に滞留（嵌頓）するリスクがある。一方、【 ⑫ 】 内視鏡は生検や止血などの治療手技が可能である。", "blanks": {"⑪": "カプセル", "⑫": "ダブルバルーン"}}, {"id": "6-11", "text": "早期大腸癌は、腫瘍の浸潤が粘膜内または 【 ⑬ 】 層までにとどまるものを指し、リンパ節転移の有無は 【 ⑭ 】。", "blanks": {"⑬": "粘膜下", "⑭": "問わない"}}, {"id": "6-12", "text": "腫瘍が粘膜内にとどまる粘膜内癌は、【 ⑮ 】 的切除の良い適応である。", "blanks": {"⑮": "内視鏡"}}, {"id": "6-13", "text": "進行大腸癌の肉眼分類において、【 ⑯ 】 型（3型）が多い。", "blanks": {"⑯": "潰瘍浸潤"}}, {"id": "6-14", "text": "注腸造影などで見られる、全周性の狭窄を示す特徴的な所見を 【 ⑰ 】 sign と呼ぶ。", "blanks": {"⑰": "apple core"}}, {"id": "6-15", "text": "大腸癌の転移様式には血行性、リンパ行性、播種性があり、血行性転移は 【 ⑱ 】 臓や肺に多い。", "blanks": {"⑱": "肝"}}, {"id": "6-16", "text": "Dukes分類において、リンパ節転移を認める場合はDukes 【 ⑲ 】 に分類される。", "blanks": {"⑲": "C"}}, {"id": "6-17", "text": "直腸癌の肛門括約筋温存手術のうち、腹膜反転部より下方で吻合する術式を低位 【 ⑳ 】 切除術という。", "blanks": {"⑳": "前方"}}, {"id": "6-18", "text": "直腸切断術（マイルズ手術など）では肛門括約筋を 【 ㉑ 】 ため、永久人工肛門の造設が必要となる。", "blanks": {"㉑": "温存しない （切除する）"}}, {"id": "6-19", "text": "【 ㉒ 】 手術は、直腸の病変部を切除し遠位側（肛門側）を閉鎖したうえで、口側腸管を用いて人工肛門を造設する術式であり、肛門自体は温存される。", "blanks": {"㉒": "ハルトマン"}}, {"id": "6-20", "text": "直腸癌の手術において、骨盤神経叢や 【 ㉓ 】 神経を温存することは、術後の排尿機能や性機能の維持に極めて重要である。", "blanks": {"㉓": "下腹"}}, {"id": "6-21", "text": "直腸癌が膀胱に直接浸潤している場合は、膀胱も 【 ㉔ 】 して切除する。", "blanks": {"㉔": "合併"}}]}, {"title": "肝疾患（良性）", "short": "肝(良性)", "icon": "🟤", "questions": [{"id": "7-1", "text": "正常な人の肝臓の重量は体重の約 【 ① 】 程度（1200〜1500g）である。", "blanks": {"①": "1/50"}}, {"id": "7-2", "text": "肝臓は 【 ② 】 分類によってS1からS8の区域に分けられる。", "blanks": {"②": "クイノー"}}, {"id": "7-3", "text": "肝臓は肝動脈から約30%、【 ③ 】 から約70%の血流（栄養）を受けている。", "blanks": {"③": "門脈"}}, {"id": "7-4", "text": "急性肝障害や急性肝不全では、肝逸脱酵素のうちASTよりも 【 ④ 】 の方が高く上昇することが多い。", "blanks": {"④": "ALT"}}, {"id": "7-5", "text": "肝硬変の重症度を示すChild-Pugh分類の項目には、肝性脳症、腹水、血清ビリルビン値、血清 【 ⑤ 】 値、および 【 ⑥ 】 時間が含まれる（アンモニアや血小板数は含まれない）。", "blanks": {"⑤": "アルブミン", "⑥": "PT （プロトロンビン）"}}, {"id": "7-6", "text": "門脈大循環シャントが形成されると、血中 【 ⑦ 】 値が上昇する。", "blanks": {"⑦": "アンモニア"}}, {"id": "7-7", "text": "ウィルソン病は、ATP7B遺伝子の異常による 【 ⑧ 】 代謝異常症であり、常染色体 【 ⑨ 】 遺伝である。", "blanks": {"⑧": "銅", "⑨": "劣性 （潜性）"}}, {"id": "7-8", "text": "ウィルソン病では、血清セルロプラスミン値が 【 ⑩ 】 となり、角膜にKayser-Fleischer（カイザー・フライシャー）輪がみられる。", "blanks": {"⑩": "低値"}}, {"id": "7-9", "text": "NAFLD/NASHのリスク因子として、肥満、2型糖尿病、脂質異常症のほか、【 ⑪ 】 な体重減少が挙げられる。", "blanks": {"⑪": "急激"}}, {"id": "7-10", "text": "副腎皮質 【 ⑫ 】 の使用は、薬剤性脂肪肝の原因となる。", "blanks": {"⑫": "ステロイド"}}, {"id": "7-11", "text": "脂肪肝の画像所見として、腹部超音波検査での肝腎 【 ⑬ 】 の上昇や、腹部CTでの肝臓のCT値 【 ⑭ 】 が特徴的である。", "blanks": {"⑬": "コントラスト", "⑭": "低下"}}, {"id": "7-12", "text": "NAFLD/NASHに対するリハビリテーションでは、食事療法と 【 ⑮ 】 療法の包括的な介入が重要である。", "blanks": {"⑮": "運動"}}, {"id": "7-13", "text": "自己免疫性肝炎（AIH）は中年以降の女性に多く、【 ⑯ 】 などの契機で増悪することがある。", "blanks": {"⑯": "出産 （妊娠・出産）"}}, {"id": "7-14", "text": "自己免疫性肝炎（AIH）では抗核抗体が陽性、血清 【 ⑰ 】 が上昇し、治療には副腎皮質ステロイドが有効である。", "blanks": {"⑰": "IgG"}}, {"id": "7-15", "text": "原発性胆汁性胆管炎（PBC）は、血清 【 ⑱ 】 が上昇し、【 ⑲ 】 抗体（AMA）が陽性となる。", "blanks": {"⑱": "IgM", "⑲": "抗ミトコンドリア"}}, {"id": "7-16", "text": "原発性胆汁性胆管炎（PBC）の治療には、【 ⑳ 】（ウルソデオキシコール酸）が第一選択となる。無症候性でも進行すれば肝移植の適応となる。", "blanks": {"⑳": "ウルソ"}}, {"id": "7-17", "text": "原発性硬化性胆管炎（PSC）は、肝内・外の胆管に数珠状の狭窄・拡張をきたし、進行性に肝機能が低下する。また、【 ㉑ 】 性大腸炎などの炎症性腸疾患を高率に合併する。", "blanks": {"㉑": "潰瘍"}}, {"id": "7-18", "text": "A型肝炎ウイルスは、カキなどの魚介類の生食による 【 ㉒ 】 感染により伝播する。慢性化することはなく、【 ㉓ 】 の接種で予防可能である。", "blanks": {"㉒": "経口", "㉓": "ワクチン"}}, {"id": "7-19", "text": "B型肝炎の母子感染（垂直感染）は、出生時のワクチンと免疫グロブリンの投与で 【 ㉔ 】 できる。", "blanks": {"㉔": "予防"}}, {"id": "7-20", "text": "B型肝炎において、HBs抗原が陰性であっても、HBc抗体やHBs抗体が陽性の患者に免疫抑制剤を使用すると、ウイルスの 【 ㉕ 】 をきたすことがある。", "blanks": {"㉕": "再活性化"}}, {"id": "7-21", "text": "C型肝炎の感染者は高齢者に多く、C型肝炎ウイルス由来の肝癌は 【 ㉖ 】 傾向にある。", "blanks": {"㉖": "減少"}}, {"id": "7-22", "text": "C型肝炎の診断において、HCV抗体だけでなくHCV-【 ㉗ 】 も陽性である場合、直接作用型抗ウイルス薬（DAA）を用いた抗ウイルス療法の対象となる。", "blanks": {"㉗": "RNA"}}, {"id": "7-23", "text": "E型肝炎ウイルスは、ブタやシカなどの肉の生食で感染する 【 ㉘ 】 感染症である。", "blanks": {"㉘": "人獣共通"}}, {"id": "7-24", "text": "急性肝不全は、初発症状から8週以内に昏睡度II度以上の肝性脳症が出現し、PT活性が 【 ㉙ 】 %以下に低下する病態である。", "blanks": {"㉙": "40"}}]}, {"title": "肝腫瘍と外科治療・肝移植", "short": "肝腫瘍", "icon": "🟣", "questions": [{"id": "8-1", "text": "肝細胞癌の発症には性差が 【 ① 】 （男性に多い）。", "blanks": {"①": "ある （過去問の「性差はない」は誤り）"}}, {"id": "8-2", "text": "肝細胞癌の発生要因として、B型・C型肝炎ウイルスによるものが5割以上を占めるが、近年は 【 ② 】 （非アルコール性脂肪肝炎）を背景とするものが 【 ③ 】 傾向にある。", "blanks": {"②": "NASH", "③": "増加"}}, {"id": "8-3", "text": "肝細胞癌のスクリーニングや診断には、腫瘍マーカーである 【 ④ 】 やPIVKA-Ⅱが有用である。", "blanks": {"④": "AFP"}}, {"id": "8-4", "text": "確定診断のために肝腫瘍生検を行うことは、出血や 【 ⑤ 】 のリスクがあるため通常は行われない（画像診断や腫瘍マーカーで診断する）。", "blanks": {"⑤": "播種"}}, {"id": "8-5", "text": "造影CT検査において、肝細胞癌は早期相で 【 ⑥ 】 し、門脈相以降で周囲の肝実質よりも吸収値が低下する（洗い出し：wash out）所見が特徴的である。", "blanks": {"⑥": "早期濃染"}}, {"id": "8-6", "text": "肝細胞癌の治療方針は、腫瘍の進行度と 【 ⑦ 】 能（Child-Pugh分類やICG15分値など）を総合的に評価して決定する。", "blanks": {"⑦": "肝予備"}}, {"id": "8-7", "text": "肝切除の安全限界を術前に評価するための基準として 【 ⑧ 】 基準が広く用いられている。", "blanks": {"⑧": "幕内"}}, {"id": "8-8", "text": "正常な肝臓は再生能力が高いため、最大で約 【 ⑨ 】 ％程度の切除が可能である（90%の切除は不可能である）。", "blanks": {"⑨": "75 （1/4残せば可能＝約75%切除まで）"}}, {"id": "8-9", "text": "ラジオ波焼灼療法（RFA）は、腫瘍径が 【 ⑩ 】 cm以内、かつ 【 ⑪ 】 個以内であれば良い適応となる。脈管侵襲、高度の肝硬変、および 【 ⑫ 】 がある場合は適応外となる。", "blanks": {"⑩": "3", "⑪": "3", "⑫": "腹水"}}, {"id": "8-10", "text": "肝細胞癌の薬物療法（一次治療）として、近年では 【 ⑬ 】 などの分子標的薬や、免疫チェックポイント阻害剤（アテゾリズマブ＋ベバシズマブなど）が使用される。", "blanks": {"⑬": "レンバチニブ"}}, {"id": "8-11", "text": "肝移植には生体肝移植と 【 ⑭ 】 肝移植があり、日本では生体肝移植が多い。", "blanks": {"⑭": "脳死"}}, {"id": "8-12", "text": "生体肝移植のドナーは、原則として親族に限られるため、友人はドナーになれ 【 ⑮ 】 。また、 【 ⑯ 】 歳未満はドナーになれない。", "blanks": {"⑮": "ない", "⑯": "20"}}, {"id": "8-13", "text": "血液型が 【 ⑰ 】 であっても、適切な処置を行うことで生体肝移植は可能である。", "blanks": {"⑰": "不適合"}}, {"id": "8-14", "text": "過去に脂肪肝の既往があっても、完治していればドナーになることが 【 ⑱ 】 。また、子宮筋腫などの良性疾患があってもドナーになることが可能である。", "blanks": {"⑱": "可能である"}}, {"id": "8-15", "text": "移植後の合併症として、代表的な日和見感染症である 【 ⑲ 】 ウイルス（CMV）感染症に注意が必要である。", "blanks": {"⑲": "サイトメガロ"}}, {"id": "8-16", "text": "肝内胆管癌は、腫瘍マーカーとしてCEAや 【 ⑳ 】 が上昇しやすく、 【 ㉑ 】 節転移をきたすことが多い。治療の基本は外科的切除（領域リンパ節郭清を伴う）である。", "blanks": {"⑳": "CA19-9", "㉑": "リンパ"}}, {"id": "8-17", "text": "肝良性腫瘍のうち最も多いのは 【 ㉒ 】 である。約10%は多発性である。", "blanks": {"㉒": "肝血管腫"}}, {"id": "8-18", "text": "肝血管腫の造影CTでは、辺縁から内部へ徐々に濃染する（綿花状濃染）所見が特徴であり、無症状であれば 【 ㉓ 】 となる。", "blanks": {"㉓": "経過観察"}}, {"id": "8-19", "text": "小児の巨大な肝血管腫は、血小板が消費されることで 【 ㉔ 】 （Kasabach-Merritt症候群）の原因となることがある。", "blanks": {"㉔": "DIC"}}, {"id": "8-20", "text": "肝細胞腺腫は、 【 ㉕ 】 女性に好発し、経口避妊薬の服用と関連がある。", "blanks": {"㉕": "若年"}}]}, {"title": "胆道疾患・門脈・脾臓（良性・悪性・外科治療）", "short": "胆道・脾臓", "icon": "🟠", "questions": [{"id": "9-1", "text": "胆嚢結石症の危険因子（5F）には、女性（Female）、40〜50代（Forty or Fifty）などのほか、【 ① 】（Fatty）が挙げられる。", "blanks": {"①": "肥満"}}, {"id": "9-2", "text": "胆嚢ポリープの経過観察には、腹部 【 ② 】 検査が有用である。", "blanks": {"②": "超音波 （または エコー）"}}, {"id": "9-3", "text": "黒色石などの色素胆石は、ビリルビンを主成分とするものであり、【 ③ 】 性胆石とは異なる。", "blanks": {"③": "コレステロール"}}, {"id": "9-4", "text": "急性胆嚢炎は、保存的加療で軽快した場合でも、再発を防ぐため待機的に 【 ④ 】 摘出術を行う。", "blanks": {"④": "胆嚢"}}, {"id": "9-5", "text": "急性胆管炎や切除不能な胆道癌による閉塞性黄疸に対しては、まず内視鏡的または経皮的胆道 【 ⑤ 】 が第一選択となる。", "blanks": {"⑤": "ドレナージ"}}, {"id": "9-6", "text": "総胆管結石の治療では、内視鏡的乳頭切開術（ 【 ⑥ 】 ）と切石術が行われる。", "blanks": {"⑥": "EST"}}, {"id": "9-7", "text": "腹腔鏡下胆嚢摘出術などで指標となるCalot（カロット）三角は、胆嚢管、総肝管、および 【 ⑦ 】 下縁で構成される。", "blanks": {"⑦": "肝 （または 肝臓）"}}, {"id": "9-8", "text": "膵胆管合流異常は 【 ⑧ 】 癌の危険因子であるため、予防的胆嚢摘出術などの適応となる。", "blanks": {"⑧": "胆嚢"}}, {"id": "9-9", "text": "胆嚢癌は中年 【 ⑨ 】 に多く、【 ⑩ 】 症を合併することが多い。", "blanks": {"⑨": "女性", "⑩": "胆石"}}, {"id": "9-10", "text": "早期胆嚢癌の予後は 【 ⑪ 】 。また、腫瘍の進行度によって術式を変更する。", "blanks": {"⑪": "良い"}}, {"id": "9-11", "text": "胆道癌に対する標準的な化学療法は、ゲムシタビンと 【 ⑫ 】 の併用療法である。", "blanks": {"⑫": "シスプラチン"}}, {"id": "9-12", "text": "遠位胆管癌に対する標準術式は、【 ⑬ 】 切除術（PD）である。", "blanks": {"⑬": "膵頭十二指腸"}}, {"id": "9-13", "text": "肝内胆管癌の外科治療は、領域 【 ⑭ 】 郭清を伴う肝切除（右肝切除または左肝切除など）が推奨される。", "blanks": {"⑭": "リンパ節"}}, {"id": "9-14", "text": "右側優位の肝門部領域胆管癌の手術では、右肝、胆管、胆嚢に加えて 【 ⑮ 】 葉も合併切除する。隣接する胃は通常切除しない。", "blanks": {"⑮": "尾状"}}, {"id": "9-15", "text": "門脈圧亢進症では、側副血行路の発達により食道・胃静脈瘤や 【 ⑯ 】 静脈瘤が生じることがある。", "blanks": {"⑯": "直腸"}}, {"id": "9-16", "text": "特発性血小板減少性紫斑病（ITP）や遺伝性球状赤血球症は、【 ⑰ 】 摘出術の良い適応となる。", "blanks": {"⑰": "脾臓"}}, {"id": "9-17", "text": "脾臓を摘出すると、術後に血中血小板数は 【 ⑱ 】 する。", "blanks": {"⑱": "増加"}}, {"id": "9-18", "text": "腹腔鏡下脾臓摘出術などの脾摘後の重篤な合併症として、肺炎球菌などによる重症感染症（ 【 ⑲ 】 ）に注意が必要である。", "blanks": {"⑲": "OPSI （Overwhelming Post-Splenectomy Infection）"}}]}, {"title": "膵臓疾患（良性・外科治療）", "short": "膵(良性)", "icon": "⚪", "questions": [{"id": "10-1", "text": "急性膵炎の原因として、男性ではアルコール性が最も多いが、女性では 【 ① 】 性が最多である。", "blanks": {"①": "胆石"}}, {"id": "10-2", "text": "重症度判定（厚生労働省の基準）には、BE（Base Excess）、LDH、CRP、血小板数などの項目が用いられるが、血清 【 ② 】 やリパーゼ値は診断には有用であっても、重症度判定項目には含まれない。", "blanks": {"②": "アミラーゼ"}}, {"id": "10-3", "text": "重症急性膵炎に伴う皮膚徴候として、側腹部に出血斑が見られる 【 ③ 】 徴候や、臍周の Cullen（カレン）徴候がある。", "blanks": {"③": "Grey-Turner （グレイ・ターナー）"}}, {"id": "10-4", "text": "胆石性急性膵炎の場合、結石の嵌頓が疑われれば早期に内視鏡的乳頭切開術（ 【 ④ 】 ）を考慮する。", "blanks": {"④": "EST"}}, {"id": "10-5", "text": "感染を伴う重症急性膵炎（感染性膵壊死や後腹膜膿瘍）の外科的処置としては、膵全摘などは行わず、まずは経皮的後腹膜 【 ⑤ 】 や、VARD（ビデオ補助下後腹膜デブリードマン）、開腹での 【 ⑥ 】（壊死組織除去術）が行われる。", "blanks": {"⑤": "ドレナージ", "⑥": "ネクロセクトミー"}}, {"id": "10-6", "text": "成人男性における慢性膵炎の成因として最も多いのは 【 ⑦ 】 である。", "blanks": {"⑦": "アルコール"}}, {"id": "10-7", "text": "慢性膵炎の代償期の症状として 【 ⑧ 】 や背部痛が見られる。進行して非代償期になると、消化・吸収不良による 【 ⑨ 】 便や、膵性糖尿病の悪化が生じる。", "blanks": {"⑧": "腹痛", "⑨": "脂肪"}}, {"id": "10-8", "text": "膵外分泌機能の低下を評価するための検査として、α1アンチトリプシンクリアランスではなく、【 ⑩ 】 試験が有用である。", "blanks": {"⑩": "BT-PABA"}}, {"id": "10-9", "text": "膵外分泌機能障害による消化吸収不良に対しては、【 ⑪ 】 薬の内服による補充療法が行われる。", "blanks": {"⑪": "消化酵素"}}, {"id": "10-10", "text": "慢性膵炎の外科治療として、膵管減圧や疼痛緩和を目的とした 【 ⑫ 】 手術（膵頭部芯抜き＋膵管空腸側々吻合術）などが代表的である。", "blanks": {"⑫": "Frey （フライ）"}}, {"id": "10-11", "text": "自己免疫性膵炎は中高年の 【 ⑬ 】 に多い。", "blanks": {"⑬": "男性"}}, {"id": "10-12", "text": "1型と2型に分類されるが、日本では 【 ⑭ 】 型が大部分を占める。", "blanks": {"⑭": "1"}}, {"id": "10-13", "text": "1型自己免疫性膵炎は、血清 【 ⑮ 】 の高値と、同抗体陽性の形質細胞浸潤を特徴とする。", "blanks": {"⑮": "IgG4"}}, {"id": "10-14", "text": "症状として激しい腹痛で発症することは少なく、無痛性の 【 ⑯ 】 や膵腫大を契機に発見されることが多い。", "blanks": {"⑯": "黄疸"}}, {"id": "10-15", "text": "画像診断などにおいて、【 ⑰ 】 との鑑別が極めて重要であり、確定診断には EUS-FNA（超音波内視鏡下穿刺吸引生検）による組織採取が有用である。", "blanks": {"⑰": "膵癌"}}, {"id": "10-16", "text": "治療には副腎皮質 【 ⑱ 】 が著効するが、減量・中止に伴い 【 ⑲ 】 することが多い。", "blanks": {"⑱": "ステロイド", "⑲": "再燃"}}, {"id": "10-17", "text": "1型自己免疫性膵炎は、膵外病変として硬化性 【 ⑳ 】 炎などを合併することが多い（潰瘍性大腸炎の合併は2型に特徴的である）。", "blanks": {"⑳": "胆管 （IgG4関連硬化性胆管炎などを合併する）"}}]}, {"title": "膵腫瘍（悪性・嚢胞性・神経内分泌腫瘍および外科治療）", "short": "膵腫瘍", "icon": "🔶", "questions": [{"id": "11-1", "text": "膵癌の危険因子として、喫煙、糖尿病、家族歴、慢性膵炎などのほか、【 ① 】 が挙げられる。", "blanks": {"①": "高脂血症"}}, {"id": "11-2", "text": "膵癌は早期発見が難しく、小型の段階で見つかることは 【 ② 】。また、腫瘍マーカー（CEA、CA19-9）は、小膵癌の初期診断よりも、予後予測や術後フォローアップに有用である。", "blanks": {"②": "まれである （過去問の「小型で見つかることが多い」は誤り）"}}, {"id": "11-3", "text": "膵頭部癌では、総胆管の閉塞により黄疸が出現し、無痛性の緊満した胆嚢を触知する 【 ③ 】 徴候がみられる。", "blanks": {"③": "Courvoisier （クールボアジェ）"}}, {"id": "11-4", "text": "造影CT検査において、膵癌は一般的に 【 ④ 】 性の腫瘤として描出される。腹腔動脈や上腸間膜動脈などへの血管浸潤の評価にも適している。", "blanks": {"④": "乏血"}}, {"id": "11-5", "text": "小膵癌の発見や、Stage 0〜1の腫瘍描出には 【 ⑤ 】（EUS）が最も高い感度を示す。", "blanks": {"⑤": "超音波内視鏡"}}, {"id": "11-6", "text": "膵癌の確定診断には EUS-FNA（超音波内視鏡下穿刺吸引生検）が用いられ、その感度・特異度および正診率は 【 ⑥ 】。", "blanks": {"⑥": "高い"}}, {"id": "11-7", "text": "膵管内乳頭粘液性腫瘍（IPMN）は、分枝型、主膵管型、混合型に分類される。MRCPでは分枝膵管の拡張によるブドウの房状の陰影がみられ、内視鏡ではファーター乳頭の開口や 【 ⑦ 】 の排出が観察される。", "blanks": {"⑦": "粘液"}}, {"id": "11-8", "text": "IPMNの手術適応となる所見には、閉塞性黄疸の出現、膵液細胞診での悪性（疑い）、主膵管径 【 ⑧ 】 mm以上の拡張、造影される 【 ⑨ 】 mm以上の壁在結節の存在などがある。", "blanks": {"⑧": "10", "⑨": "5"}}, {"id": "11-9", "text": "粘液性嚢胞腫瘍（MCN）は 【 ⑩ 】 に多く、膵 【 ⑪ 】 部に好発する。", "blanks": {"⑩": "女性", "⑪": "体尾"}}, {"id": "11-10", "text": "MCNは通常、主膵管との交通を 【 ⑫ 】。悪性化して周囲への浸潤やリンパ節転移をきたすことがあるため、手術適応となる。", "blanks": {"⑫": "持たない"}}, {"id": "11-11", "text": "膵神経内分泌腫瘍は一般に境界明瞭であり、造影CTなどでは膵癌とは異なり 【 ⑬ 】 性の腫瘤として描出される。", "blanks": {"⑬": "多血"}}, {"id": "11-12", "text": "免疫組織化学染色では、神経内分泌マーカーである 【 ⑭ 】 やシナプトフィジンが陽性となる。", "blanks": {"⑭": "クロモグラニンA"}}, {"id": "11-13", "text": "機能性腫瘍のうち、インスリノーマは低血糖をきたし、典型的な症状として 【 ⑮ 】 の3徴を呈する。", "blanks": {"⑮": "Whipple （ホイップル）"}}, {"id": "11-14", "text": "ガストリノーマは胃酸の過剰分泌と難治性の消化性潰瘍（ 【 ⑯ 】 症候群）を示す。リンパ節転移や肝転移を伴うことがある。", "blanks": {"⑯": "Zollinger-Ellison （ゾリンジャー・エリソン）"}}, {"id": "11-15", "text": "ガストリノーマの局在診断や術式選択のために、選択的動脈内分泌刺激試験（ 【 ⑰ 】 test）が有用である。", "blanks": {"⑰": "SASI"}}, {"id": "11-16", "text": "多発性の膵神経内分泌腫瘍は、多発性内分泌腫瘍症 【 ⑱ 】 型（MEN-1）として家族性に発生することがある。", "blanks": {"⑱": "1"}}, {"id": "11-17", "text": "遠位胆管癌や膵頭部癌など、膵頭部領域の腫瘍に対する標準術式は 【 ⑲ 】 切除術である。", "blanks": {"⑲": "膵頭十二指腸"}}, {"id": "11-18", "text": "膵体部や膵尾部の癌に対しては、主に 【 ⑳ 】 切除術が行われる。", "blanks": {"⑳": "膵体尾部"}}]}, {"title": "肝胆膵の検査・治療手技", "short": "検査手技", "icon": "🔬", "questions": [{"id": "12-1", "text": "腹腔鏡下手術は開腹手術と比較して術後の 【 ① 】 が軽減され、創部が小さいため美容面でも優れている。また、モニター画面による術野の共有ができるため 【 ② 】 的な効果も高い。", "blanks": {"①": "疼痛 （「痛みが少ない」でも可）", "②": "教育"}}, {"id": "12-2", "text": "腹腔鏡下手術では、肺合併症、腸閉塞、創関連などの術後合併症が 【 ③ 】 する。", "blanks": {"③": "減少 （「減る」でも可）"}}, {"id": "12-3", "text": "ロボット支援下手術は、多関節操作により人間の手を超えた 【 ④ 】 での精密な手技が可能である。一方で、術中の 【 ⑤ 】 が欠如するため、組織の意図しない損傷に注意が必要である。", "blanks": {"④": "可動域", "⑤": "触覚 （または 感覚）"}}, {"id": "12-4", "text": "肝臓の外科治療において、腹腔鏡下肝切除術は開腹手術と比較して 【 ⑥ 】 量の減少が期待できる。", "blanks": {"⑥": "出血"}}, {"id": "12-5", "text": "腹腔鏡下膵頭十二指腸切除術などの高度な技術を要する手術は、施設基準を満たした 【 ⑦ 】 施設で行うことが義務付けられている。", "blanks": {"⑦": "認定"}}, {"id": "12-6", "text": "肝胆膵領域の画像・内視鏡検査のうち、ERCP（内視鏡的逆行性胆管膵管造影）は合併症（急性膵炎など）のリスクがあり、腹部エコーやCT・MRIと比較して侵襲性が 【 ⑧ 】。", "blanks": {"⑧": "高い"}}, {"id": "12-7", "text": "小型の膵癌の発見や腫瘍の描出には、体外式の超音波検査よりも超音波内視鏡（ 【 ⑨ 】 ）が優れている。", "blanks": {"⑨": "EUS"}}, {"id": "12-8", "text": "膵癌の病理診断において、超音波内視鏡下穿刺吸引生検（ 【 ⑩ 】 ）は膵液細胞診よりも有用であり、正診率は90%以上と非常に高い。", "blanks": {"⑩": "EUS-FNA"}}, {"id": "12-9", "text": "肝細胞癌の画像診断において、早期濃染や洗い出し（wash out）の評価に加え、肝細胞機能を評価できる 【 ⑪ 】 造影MRIが有用である。", "blanks": {"⑪": "EOB"}}, {"id": "12-10", "text": "総胆管結石の治療において、内視鏡的に十二指腸乳頭部を切開して結石を排出させる手技を、内視鏡的乳頭切開術（ 【 ⑫ 】 ）と呼ぶ。", "blanks": {"⑫": "EST"}}, {"id": "12-11", "text": "急性胆管炎や切除不能な胆道癌による閉塞性黄疸に対して、体外から経皮的かつ経肝的に胆管へアプローチしてドレナージを行う手技を 【 ⑬ 】（経皮経肝胆道ドレナージ）と呼ぶ。", "blanks": {"⑬": "PTBD （または PTCD）"}}, {"id": "12-12", "text": "肝細胞癌の局所療法であるラジオ波焼灼療法（ 【 ⑭ 】 ）は、腫瘍径が3cm以内、かつ3個以内が良い適応となる。", "blanks": {"⑭": "RFA"}}, {"id": "12-13", "text": "肝切除を予定する患者において、安全な切除範囲（肝予備能）を評価するために、血清ビリルビン値や腹水の有無に加え、【 ⑮ 】（インドシアニングリーン）試験15分値を用いた幕内基準が用いられる。", "blanks": {"⑮": "ICG"}}, {"id": "12-14", "text": "慢性膵炎に対する外科治療（膵管減圧術）として、膵頭部の芯抜きと膵管空腸側々吻合を組み合わせた 【 ⑯ 】 手術などが行われる。", "blanks": {"⑯": "Frey （フライ）"}}]}, {"title": "総論・腹壁・薬理・リハビリ", "short": "総論", "icon": "📋", "questions": [{"id": "13-1", "text": "新しい専門医制度は、 【 ① 】 年度から導入された。", "blanks": {"①": "2018"}}, {"id": "13-2", "text": "心臓血管外科などのサブスペシャルティ領域の専門医を取得するためには、まず基本領域である 【 ② 】 専門医を取得する必要がある。", "blanks": {"②": "外科"}}, {"id": "13-3", "text": "我が国において、身体障害者福祉法で「内部障害」に指定されている消化器疾患は、小腸機能障害と 【 ③ 】 障害である。", "blanks": {"③": "肝機能 （肝臓機能）"}}, {"id": "13-4", "text": "鼠径部のヘルニアの構成成分は、ヘルニア門、ヘルニア嚢、およびヘルニア 【 ④ 】 である。", "blanks": {"④": "筋膜"}}, {"id": "13-5", "text": "間接（外）鼠径ヘルニアの診断には、精索の肥厚を触知する 【 ⑤ 】 sign が特徴的である。", "blanks": {"⑤": "silk （シルク）"}}, {"id": "13-6", "text": "閉鎖孔ヘルニアは痩せた 【 ⑥ 】 に起こりやすく、大腿内側の痛みを訴える Howship-Romberg 徴候が特徴的である。", "blanks": {"⑥": "高齢女性 （過去問の「太った中年男性」は誤り）"}}, {"id": "13-7", "text": "嵌頓ヘルニアは腸管の血行障害をきたすため、 【 ⑦ 】 の処置（緊急手術など）が必要である。", "blanks": {"⑦": "早期"}}, {"id": "13-8", "text": "腸閉塞の治療中などに、腸管内の細菌が腸管壁を越えて全身に移行する bacterial 【 ⑧ 】 を来すことがある。", "blanks": {"⑧": "translocation （トランスロケーション）"}}, {"id": "13-9", "text": "絞扼性腸閉塞では、血管の絞扼により腸管の壊死や血流障害が起こり 【 ⑨ 】 。", "blanks": {"⑨": "やすい （「少ない」は誤り）"}}, {"id": "13-10", "text": "腹膜偽粘液腫では、腹腔内に漿液ではなく 【 ⑩ 】 成分が貯留する。", "blanks": {"⑩": "粘液"}}, {"id": "13-11", "text": "デスモイド腫瘍は良性（転移はきたさない）であるが局所浸潤性が強く、切除後も 【 ⑪ 】 しやすい。", "blanks": {"⑪": "再発 （「再発率は低い」は誤り）"}}, {"id": "13-12", "text": "特発性後腹膜線維症では、後腹膜の線維化により 【 ⑫ 】 の閉塞をきたすことが多い。", "blanks": {"⑫": "尿管 （「閉塞は稀」は誤り）"}}, {"id": "13-13", "text": "腹痛などの症状に対して、抗コリン薬である 【 ⑬ 】 臭化物（鎮痙薬）を投与すると、前立腺肥大症の患者などでは副作用として 【 ⑭ 】 を起こすことがある。", "blanks": {"⑬": "ブチルスコポラミン", "⑭": "尿閉"}}, {"id": "13-14", "text": "下痢型過敏性腸症候群（IBS）の治療には、セロトニン（5-HT3）受容体拮抗薬である 【 ⑮ 】 などが用いられる。", "blanks": {"⑮": "ラモセトロン"}}, {"id": "13-15", "text": "難治性の炎症性腸疾患（IBD）に用いられるインフリキシマブは、血液製剤ではなく抗 【 ⑯ 】 α抗体製剤（分子標的薬）である。", "blanks": {"⑯": "TNF"}}, {"id": "13-16", "text": "H. pylori の一次除菌には、PPI（またはP-CAB）、アモキシシリン、および 【 ⑰ 】 が用いられ、失敗した際の二次除菌ではこれを 【 ⑱ 】 に変更する。", "blanks": {"⑰": "クラリスロマイシン", "⑱": "メトロニダゾール"}}, {"id": "13-17", "text": "NAFLD/NASH のリハビリテーションでは、患者単独ではなく、 【 ⑲ 】 も交えた包括的な介入（食事療法・運動療法など）が重要である。", "blanks": {"⑲": "家族"}}, {"id": "13-18", "text": "NAFLD/NASH に対する運動療法は、明らかな体重減少が 【 ⑳ 】 場合でも肝機能の改善効果が認められる。", "blanks": {"⑳": "ない （「体重減少があって初めて効果が認められる」は誤り）"}}, {"id": "13-19", "text": "NAFLD/NASH に対する運動療法は、肝機能の改善だけでなく、 【 ㉑ 】 系の機能改善にも効果がある。", "blanks": {"㉑": "心血管"}}]}, {"title": "腹部・腸管の物理的疾患", "short": "腹部疾患", "icon": "🏥", "questions": [{"id": "14-1", "text": "腸閉塞の治療中（経過中）に、腸管壁のバリア機能が破綻して腸内細菌が血中やリンパ節へ移行する 【 ① 】 （bacterial translocation）を来すことがある。", "blanks": {"①": "bacterial translocation （または 細菌移行）"}}, {"id": "14-2", "text": "絞扼性（こうやくせい）腸閉塞では、腸管だけでなく 【 ② 】 の絞扼により血流障害が生じるため、腸管壊死に至る危険性が高く、緊急処置が必要となる。", "blanks": {"②": "血管"}}, {"id": "14-3", "text": "腹膜偽粘液腫では、腹腔内に 【 ③ 】 状の物質（ゼリー状粘液）が貯留する。", "blanks": {"③": "粘液"}}, {"id": "14-4", "text": "デスモイド腫瘍は、遠隔転移は来さないものの局所浸潤性が強く、切除後の再発率が 【 ④ 】。", "blanks": {"④": "高い"}}, {"id": "14-5", "text": "特発性後腹膜線維症は、後腹膜の線維化により 【 ⑤ 】 の閉塞（水腎症など）をきたす疾患である。", "blanks": {"⑤": "尿管"}}, {"id": "14-6", "text": "ヘルニアの構成成分は、ヘルニア門、ヘルニア嚢、およびヘルニア 【 ⑥ 】 （脱出した腸管などの臓器）の3つである。", "blanks": {"⑥": "内容"}}, {"id": "14-7", "text": "嵌頓（かんとん）ヘルニアは、脱出した臓器が戻らなくなり 【 ⑦ 】 障害をきたす（絞扼性ヘルニアとなる）危険があるため、早期の処置が必要である。", "blanks": {"⑦": "血行 （または 血流）"}}, {"id": "14-8", "text": "閉鎖孔ヘルニアは、【 ⑧ 】 た高齢女性に好発する。", "blanks": {"⑧": "痩せ"}}, {"id": "14-9", "text": "閉鎖孔ヘルニアでは、閉鎖神経の圧迫により大腿内側から膝にかけて痛みが生じる 【 ⑨ 】 徴候が特徴的である。", "blanks": {"⑨": "Howship-Romberg （ハウシップ・ロンベルグ）"}}, {"id": "14-10", "text": "小児の鼠径ヘルニアの診断において、精索の肥厚を絹糸が擦れ合うように触知する 【 ⑩ 】 sign が有用である。", "blanks": {"⑩": "silk"}}, {"id": "14-11", "text": "腹腔内の異常な裂孔や陥凹に臓器が入り込むものを内ヘルニアと呼び、【 ⑪ 】 ヘルニアなどがこれに含まれる（鼠径、大腿、閉鎖孔などは外ヘルニアである）。", "blanks": {"⑪": "食道裂孔"}}]}, {"title": "臨床薬理学", "short": "薬理学", "icon": "💊", "questions": [{"id": "15-1", "text": "腹痛などの症状に対して鎮痙薬である 【 ① 】 臭化物を投与すると、抗コリン作用により前立腺肥大症の患者などで 【 ② 】 を起こすことがある。", "blanks": {"①": "ブチルスコポラミン", "②": "尿閉"}}, {"id": "15-2", "text": "消化管運動を促進する（胃排出を促す）薬剤として、【 ③ 】 やドンペリドン、モサプリドなどが用いられる。", "blanks": {"③": "アコチアミド"}}, {"id": "15-3", "text": "下痢型過敏性腸症候群（IBS）の治療には、セロトニン（5-HT3）受容体拮抗薬である 【 ④ 】 などが用いられる。", "blanks": {"④": "ラモセトロン"}}, {"id": "15-4", "text": "小腸粘膜上皮からの水分分泌を主に惹起し、慢性便秘症の治療に用いられる薬剤は 【 ⑤ 】 である。", "blanks": {"⑤": "ルビプロストン"}}, {"id": "15-5", "text": "回腸末端での胆汁酸の吸収を抑制し、大腸への水分分泌や運動を促進する便秘治療薬は 【 ⑥ 】 である。", "blanks": {"⑥": "エロビキシバット"}}, {"id": "15-6", "text": "H. pylori の一次除菌には、PPI（またはP-CAB）、アモキシシリン、および 【 ⑦ 】 が用いられる。", "blanks": {"⑦": "クラリスロマイシン"}}, {"id": "15-7", "text": "初回除菌失敗の原因として、喫煙、薬剤耐性（耐性菌）、PPIの酸分泌抑制効果の個体差、服薬アドヒアランス（コンプライアンス）の不良などが挙げられる。抗薬物抗体（中和抗体）の出現は原因に 【 ⑧ 】。", "blanks": {"⑧": "含まれない （ならない）"}}, {"id": "15-8", "text": "一次除菌に失敗した際の二次除菌では、抗菌薬を 【 ⑨ 】 に変更して投与する。", "blanks": {"⑨": "メトロニダゾール"}}, {"id": "15-9", "text": "難治性の炎症性腸疾患（IBD）に用いられるインフリキシマブは、抗TNF-α抗体製剤であり 【 ⑩ 】 標的薬に分類される。完全ヒト型抗体製剤や血液製剤に該当するという記述は誤りであり、また使用経過中に効果が減弱する二次無効が 【 ⑪ 】。", "blanks": {"⑩": "分子", "⑪": "生じる （起こり得る）"}}, {"id": "15-10", "text": "炎症性腸疾患の治療に用いられる分子標的薬には、抗TNF-α抗体のほかに、抗IL-12/23抗体やJAK阻害薬などがある。副腎皮質ステロイドや5-ASA製剤は分子標的薬には 【 ⑫ 】。", "blanks": {"⑫": "含まれない"}}, {"id": "15-11", "text": "NSAIDs（非ステロイド性抗炎症薬）は、胃潰瘍だけでなく、小腸や大腸に多様な 【 ⑬ 】 潰瘍などの病変を形成することがある。", "blanks": {"⑬": "縦走"}}, {"id": "15-12", "text": "免疫チェックポイント阻害剤の副作用（irAE）として、潰瘍性大腸炎に類似したクローン病様の腸炎が生じることがある。この腸炎の治療には、主に副腎皮質 【 ⑭ 】 が第一選択として使用される（5-アミノサリチル酸は用いられない）。", "blanks": {"⑭": "ステロイド"}}]}, {"title": "消化器疾患のリハビリテーション", "short": "リハビリ", "icon": "🏃", "questions": [{"id": "16-1", "text": "NAFLD/NASHのリハビリテーションでは、食事療法と運動療法を組み合わせた 【 ① 】 的な介入が重要である。", "blanks": {"①": "包括"}}, {"id": "16-2", "text": "治療・生活改善の介入には、患者本人だけでなく 【 ② 】 も交えて行うことが推奨される。", "blanks": {"②": "家族"}}, {"id": "16-3", "text": "入院での介入後も、退院後の外来において 【 ③ 】 的なフォローアップを行うことが必要である。", "blanks": {"③": "長期"}}, {"id": "16-4", "text": "肥満を伴うNAFLD患者に対して、リハビリテーションの機序や専門技術を用いた介入は臨床的に 【 ④ 】 である。", "blanks": {"④": "有用 （「有効」でも可）"}}, {"id": "16-5", "text": "NAFLD/NASHに対する運動療法は、明らかな 【 ⑤ 】 の減少が見られない場合であっても、肝機能の改善効果が認められる。", "blanks": {"⑤": "体重"}}, {"id": "16-6", "text": "NAFLD/NASHに対する運動療法は、肝機能の改善にとどまらず、 【 ⑥ 】 系の機能改善にも効果がある。", "blanks": {"⑥": "心血管"}}]}];
const BLANK_RE = /【\s*([\u2460-\u2473\u3251-\u325f\u32b1-\u32bf])\s*】/g;


let state = {
  section: 'all',
  unmasteredOnly: false,
  mastered: JSON.parse(localStorage.getItem('gm_mastered') || '{}'),
};

function saveMastered(){
  localStorage.setItem('gm_mastered', JSON.stringify(state.mastered));
}

function renderTabs(){
  const nav = document.getElementById('tabs');
  let html = '<div class="tab active" data-sec="all" onclick="selectTab(this)">おすすめ</div>';
  QUIZ_DATA.forEach((s,i) => {
    html += `<div class="tab" data-sec="${i}" onclick="selectTab(this)">${s.short}</div>`;
  });
  nav.innerHTML = html;
}
function selectTab(el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  state.section = el.dataset.sec;
  renderTimeline();
}

function getVisibleQuestions(){
  let qs = [];
  QUIZ_DATA.forEach((sec, si) => {
    if(state.section !== 'all' && state.section !== String(si)) return;
    sec.questions.forEach(q => {
      if(state.unmasteredOnly && state.mastered[q.id]) return;
      qs.push({...q, secTitle: sec.title, secShort: sec.short, secIcon: sec.icon});
    });
  });
  return qs;
}

function hashCode(str) {
  let hash = 0;
  for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
  return hash;
}

function renderTimeline(){
  const main = document.getElementById('timeline');
  const qs = getVisibleQuestions();
  if(!qs.length){
    main.innerHTML = '<div class="empty-msg">🎉 表示するツイートがありません</div>';
    updateProgress();
    return;
  }
  let html = '';
  qs.forEach(q => {
    const isMastered = state.mastered[q.id];
    let body = '';
    let last = 0;
    let raw = q.text;
    let match;
    let re = new RegExp(BLANK_RE.source, 'g');
    while((match = re.exec(raw)) !== null){
      body += escHtml(raw.slice(last, match.index));
      const label = match[1];
      const answer = q.blanks[label] || '???';
      body += `<button class="blank" data-qid="${q.id}" data-label="${label}" data-answer="${escAttr(answer)}" onclick="revealBlank(this)">${label}</button>`;
      last = re.lastIndex;
    }
    body += escHtml(raw.slice(last));

    // Determine fake time
    const hash = Math.abs(hashCode(q.id));
    const timeNum = hash % 60 + 1;
    const timeStr = hash % 2 === 0 ? `${timeNum}分` : `${timeNum%24 + 1}時間`;
    const replies = hash % 12;
    const views = hash % 500 + 10;
    const rts = hash % 5;

    html += `<div class="card${isMastered?' mastered':''}" data-qid="${q.id}">
      <div class="card-left">
        <div class="avatar">${q.secIcon}</div>
      </div>
      <div class="card-right">
        <div class="card-head">
          <div class="meta">
            <span class="display-name">${escHtml(q.secTitle)}</span>
            <span class="handle">@${escHtml(q.secShort)}</span>
            <span class="dot">·</span>
            <span class="time">${timeStr}</span>
          </div>
          <div style="color:var(--sub);cursor:pointer">${SVG_DOTS}</div>
        </div>
        <div class="card-body">${body}</div>
        <div class="actions">
          <div class="action-group">
            <button class="action-btn reply-btn">
              <span class="icon">${SVG_REPLY}</span>
              <span class="count">${replies||''}</span>
            </button>
          </div>
          <div class="action-group">
            <button class="action-btn rt-btn" onclick="resetCard('${q.id}')">
              <span class="icon">${SVG_RT}</span>
              <span class="count">${rts||''}</span>
            </button>
          </div>
          <div class="action-group">
            <button class="action-btn like-btn${isMastered?' hearted':''}" onclick="toggleMaster('${q.id}',this)">
              <span class="icon">${isMastered ? SVG_HEART_FILLED : SVG_HEART}</span>
              <span class="count">${isMastered?'1':'0'}</span>
            </button>
          </div>
          <div class="action-group">
            <button class="action-btn view-btn">
              <span class="icon">${SVG_VIEWS}</span>
              <span class="count">${views}</span>
            </button>
          </div>
          <div class="action-group right-actions">
            <button class="action-btn bm-btn"><span class="icon">${SVG_BM}</span></button>
            <button class="action-btn share-btn"><span class="icon">${SVG_SHARE}</span></button>
          </div>
        </div>
      </div>
    </div>`;
  });
  main.innerHTML = html;
  updateProgress();
}

function escHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function escAttr(s){
  return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function revealBlank(el){
  if(el.classList.contains('revealed')){
    el.classList.remove('revealed');
    el.textContent = el.dataset.label;
  } else {
    el.classList.add('revealed');
    el.textContent = el.dataset.answer;
  }
}

function toggleMaster(qid, btn){
  if(state.mastered[qid]){
    delete state.mastered[qid];
  } else {
    state.mastered[qid] = true;
  }
  saveMastered();
  renderTimeline();
}

function resetCard(qid){
  delete state.mastered[qid];
  saveMastered();
  renderTimeline();
}

function toggleUnmastered(){
  state.unmasteredOnly = !state.unmasteredOnly;
  document.getElementById('btn-unmastered').classList.toggle('on', state.unmasteredOnly);
  renderTimeline();
}

function shuffleCards(){
  QUIZ_DATA.forEach(sec => {
    for(let i = sec.questions.length - 1; i > 0; i--){
      const j = Math.floor(Math.random() * (i + 1));
      [sec.questions[i], sec.questions[j]] = [sec.questions[j], sec.questions[i]];
    }
  });
  renderTimeline();
}

function resetShuffle(){
  QUIZ_DATA.forEach(sec => {
    sec.questions.sort((a, b) => {
      let aNum = parseInt(a.id.split('-').pop());
      let bNum = parseInt(b.id.split('-').pop());
      return aNum - bNum;
    });
  });
  renderTimeline();
}

function revealAll(){
  document.querySelectorAll('.blank:not(.revealed)').forEach(el => {
    el.classList.add('revealed');
    el.textContent = el.dataset.answer;
  });
}

function resetAll(){
  if(!confirm('全ての「覚えた」をリセットしますか？')) return;
  state.mastered = {};
  saveMastered();
  renderTimeline();
}

function updateProgress(){
  const total = QUIZ_DATA.reduce((a,s) => a + s.questions.length, 0);
  const done = Object.keys(state.mastered).length;
  document.getElementById('progress').textContent = `${done} / ${total} 完了`;
}

let lastScrollY = window.scrollY;
window.addEventListener('scroll', () => {
  const currentScrollY = window.scrollY;
  const bottomNav = document.getElementById('bottom-nav');
  const fab = document.getElementById('fab');
  const topBar = document.getElementById('top-bar');
  
  if (currentScrollY > lastScrollY && currentScrollY > 50) {
    bottomNav.classList.add('hidden');
    fab.classList.add('hidden');
    topBar.classList.add('hidden');
  } else {
    bottomNav.classList.remove('hidden');
    fab.classList.remove('hidden');
    topBar.classList.remove('hidden');
  }
  lastScrollY = currentScrollY;
}, { passive: true });

renderTabs();
renderTimeline();
</script>
</body>
</html>
